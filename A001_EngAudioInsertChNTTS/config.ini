[OriginalConfigPath]
# Directory that contains the original input audio files.
OriginalAudioPath=../OriginalAudio/Lex
# Directory where generated markdown translation notes are written.
TranslatePath=../Resource/translate
# Directory where generated Chinese vocabulary audio files are written.
AudioTranslatedPath=../Resource/chineseTTS

[RuntimeConfig]
# Select the compute branch: GPU uses the ROCm/CUDA Whisper path, CPU uses all available CPU cores.
CaculateCore=GPU

[DifficultyConfig]
# CEFR levels that should always be treated as difficult vocabulary.
AdvancedLevels=C1,C2
# Minimum word length before a word can be considered for difficulty checks.
MinCandidateLength=5
# Minimum length for B1 words before frequency filtering can mark them as difficult.
B1MinLength=8
# Maximum word frequency for B1 words to be treated as difficult.
B1FrequencyThreshold=0.000003
# Minimum length for B2 words before frequency filtering can mark them as difficult.
B2MinLength=8
# Maximum word frequency for B2 words to be treated as difficult.
B2FrequencyThreshold=0.000012
# Minimum length for words with unknown CEFR level before frequency filtering can mark them as difficult.
UnknownMinLength=8
# Maximum word frequency for unknown-level words to be treated as difficult.
UnknownFrequencyThreshold=0.000003

[TranslationConfig]
# Number of source segments to group before extracting and translating vocabulary.
SegmentsPerTranslation=2
# Use the current segment group as context to choose one best Chinese meaning per word.
UseContextMeaning=1
# Maximum number of characters allowed for each Chinese meaning.
MaxMeaningChars=8
# Retry once when the model returns a verbose or invalid meaning.
RetryOnVerboseMeaning=1
# Policy for unclear meanings; skip means the word is omitted from the output.
AmbiguousMeaningPolicy=skip
# Ollama sampling temperature for deterministic vocabulary meanings.
OllamaTemperature=0
# Do not translate the same word again within this many seconds.
TranslationRepeatWindowSeconds=120

[ProperNounConfig]
# Enable spaCy NER filtering so person/place/organization names are not translated.
SkipProperNouns=1
# spaCy English NER model loaded on CPU.
NlpModel=en_core_web_sm
# Entity labels that should be filtered before vocabulary translation.
EntityLabels=PERSON,GPE,LOC,FAC,ORG
# Extra comma-separated words to skip even if the NER model misses them.
SkipWords=
